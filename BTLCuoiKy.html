<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý đồ uống</title>
    <link rel="stylesheet" href="BTLCuoiKy.css">
</head>

<body>
    <svg aria-hidden="true" class="icon-sprite">
        <symbol id="icon-dashboard" viewBox="0 0 24 24">
            <path d="M4 13h7V4H4v9Zm9 7h7V4h-7v16ZM4 20h7v-5H4v5Z"></path>
        </symbol>
        <symbol id="icon-box" viewBox="0 0 24 24">
            <path
                d="m12 3 8 4.5v9L12 21l-8-4.5v-9L12 3Zm0 2.3L7.2 8 12 10.7 16.8 8 12 5.3Zm-6 4.4v5.6l5 2.8v-5.6L6 9.7Zm7 8.4 5-2.8V9.7l-5 2.8v5.6Z">
            </path>
        </symbol>
        <symbol id="icon-user" viewBox="0 0 24 24">
            <path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm0 2c-4.2 0-8 2.2-8 5v2h16v-2c0-2.8-3.8-5-8-5Z"></path>
        </symbol>
        <symbol id="icon-briefcase" viewBox="0 0 24 24">
            <path
                d="M9 5h6V3H9v2Zm-4 2h14a2 2 0 0 1 2 2v4h-7v-2h-4v2H3V9a2 2 0 0 1 2-2Zm5 8h4v-2h7v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5h7v2Z">
            </path>
        </symbol>
        <symbol id="icon-receipt" viewBox="0 0 24 24">
            <path d="M6 3h12v18l-2-1.2-2 1.2-2-1.2-2 1.2-2-1.2L6 21V3Zm3 5h6V6H9v2Zm0 4h6v-2H9v2Zm0 4h4v-2H9v2Z"></path>
        </symbol>
        <symbol id="icon-list" viewBox="0 0 24 24">
            <path d="M5 7h3V4H5v3Zm5 0h9V5h-9v2ZM5 13h3v-3H5v3Zm5 0h9v-2h-9v2Zm-5 6h3v-3H5v3Zm5 0h9v-2h-9v2Z"></path>
        </symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24">
            <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"></path>
        </symbol>
        <symbol id="icon-edit" viewBox="0 0 24 24">
            <path
                d="M5 17.8V21h3.2L18.9 10.3l-3.2-3.2L5 17.8ZM21 8.2c.4-.4.4-1 0-1.4L19.2 5c-.4-.4-1-.4-1.4 0l-1.1 1.1 3.2 3.2L21 8.2Z">
            </path>
        </symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24">
            <path
                d="M8 4h8l1 2h4v2H3V6h4l1-2Zm1 6h2v8H9v-8Zm4 0h2v8h-2v-8Zm4 0h2v8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-8h2v8h10v-8Z">
            </path>
        </symbol>
        <symbol id="icon-search" viewBox="0 0 24 24">
            <path d="m20.7 19.3-4.1-4.1a7 7 0 1 0-1.4 1.4l4.1 4.1 1.4-1.4ZM5 11a5 5 0 1 1 10 0 5 5 0 0 1-10 0Z"></path>
        </symbol>
        <symbol id="icon-refresh" viewBox="0 0 24 24">
            <path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.8-4.2L13 11h8V3l-3.3 3.3Z"></path>
        </symbol>
        <symbol id="icon-close" viewBox="0 0 24 24">
            <path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z">
            </path>
        </symbol>
        <symbol id="icon-filter" viewBox="0 0 24 24">
            <path d="M4 5h16l-6 7v6l-4 2v-8L4 5Z"></path>
        </symbol>
    </svg>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">
                    <span></span>
                </div>
                <div>
                    <strong>Shop</strong>
                    <span>Đồ uống đây</span>
                </div>
            </div>
            <nav class="nav-list" id="navList" aria-label="Bảng dữ liệu"></nav>
        </aside>

        <main class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Shop của Phúc Quang Quang Anh</p>
                    <h1 id="viewTitle">Tổng quan</h1>
                </div>
                <div class="topbar-actions">
                    <button class="icon-button" id="resetBtn" type="button" title="Khôi phục dữ liệu mẫu"
                        aria-label="Khôi phục dữ liệu mẫu">
                        <svg class="icon">
                            <use href="#icon-refresh"></use>
                        </svg>
                    </button>
                </div>
            </header>

            <section id="dashboardView" class="view"></section>

            <section id="tableView" class="view is-hidden">
                <div class="table-toolbar">
                    <div class="search-box">
                        <svg class="icon">
                            <use href="#icon-search"></use>
                        </svg>
                        <input id="searchInput" type="search" placeholder="Tìm kiếm">
                    </div>
                    <div class="toolbar-right">
                        <label class="select-filter" id="statusFilterWrap">
                            <svg class="icon">
                                <use href="#icon-filter"></use>
                            </svg>
                            <select id="statusFilter">
                                <option value="">Tất cả trạng thái</option>
                                <option value="Đã hoàn thành">Đã hoàn thành</option>
                                <option value="Chờ xử lý">Chờ xử lý</option>
                                <option value="Đã hủy">Đã hủy</option>
                            </select>
                        </label>
                        <button class="primary-button" id="addBtn" type="button">
                            <svg class="icon">
                                <use href="#icon-plus"></use>
                            </svg>
                            <span>Thêm</span>
                        </button>
                    </div>
                </div>
                <div class="table-panel">
                    <div class="table-scroll">
                        <table>
                            <thead id="tableHead"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                    <div class="empty-state is-hidden" id="emptyState">Không có dữ liệu phù hợp</div>
                </div>
            </section>
        </main>
    </div>

    <dialog id="recordDialog" class="record-dialog">
        <form method="dialog" id="recordForm" class="record-form">
            <div class="dialog-head">
                <div>
                    <p class="eyebrow" id="dialogMode">Thêm mới</p>
                    <h2 id="dialogTitle">Bản ghi</h2>
                </div>
                <button class="icon-button" value="cancel" type="button" id="closeDialogBtn" title="Đóng"
                    aria-label="Đóng">
                    <svg class="icon">
                        <use href="#icon-close"></use>
                    </svg>
                </button>
            </div>
            <div class="form-grid" id="formFields"></div>
            <div class="dialog-actions">
                <button class="ghost-button" value="cancel" type="button" id="cancelDialogBtn">Hủy</button>
                <button class="primary-button" value="default" type="submit">Lưu</button>
            </div>
        </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="BTLCuoiKy.js"></script>
</body>

</html>
